<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel to Word Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-emerald-900 text-slate-100">
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-xl rounded-2xl border border-white/10 bg-white/5 p-8 shadow-2xl backdrop-blur">
      <p class="text-xs uppercase tracking-[0.25em] text-emerald-300">Hulk the Great made this possible</p>
      <h1 class="mt-3 text-3xl font-semibold">Excel → Word Generator</h1>
      <p class="mt-2 text-sm text-slate-300">
        Upload your Excel file and download a Word document. Nothing is stored.
      </p>

      <div class="mt-6">
        <label for="fileInput" class="block text-sm text-slate-200">Excel file</label>
        <input
          id="fileInput"
          type="file"
          accept=".xlsx,.xls"
          class="mt-2 w-full rounded-lg border border-white/10 bg-slate-900/60 px-3 py-2 text-sm text-slate-100 focus:outline-none focus:ring-2 focus:ring-emerald-400"
        />
      </div>

      <button
        id="generateBtn"
        class="mt-6 w-full rounded-lg bg-emerald-400 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-emerald-300 disabled:cursor-not-allowed disabled:opacity-60"
        onclick="upload()"
      >
        Generate Word Doc
      </button>

      <p id="status" class="mt-4 text-sm text-slate-300"></p>
      <p class="mt-2 text-xs text-slate-400">Endpoint: <span id="apiHint" class="text-slate-200">YOUR_API_URL/generate-lines</span></p>
    </div>
  </div>

  <script>
    const API_BASE = "YOUR_API_URL"; // Example: https://api.yourdomain.com

    const statusEl = document.getElementById("status");
    const btn = document.getElementById("generateBtn");
    const apiHint = document.getElementById("apiHint");
    apiHint.textContent = `${API_BASE}/generate-lines`;

    async function upload() {
      const fileInput = document.getElementById("fileInput");
      const file = fileInput.files[0];

      if (!file) {
        alert("Please select an Excel file.");
        return;
      }

      btn.disabled = true;
      statusEl.textContent = "Uploading...";

      const formData = new FormData();
      formData.append("file", file);

      try {
        const response = await fetch(`${API_BASE}/generate-lines`, {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || `Request failed (${response.status})`);
        }

        const blob = await response.blob();
        const link = document.createElement("a");
        link.href = window.URL.createObjectURL(blob);
        link.download = "Group_Status_Report.docx";
        link.click();

        statusEl.textContent = "Done. Your Word document should be downloading.";
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
